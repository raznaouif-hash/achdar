                        </div>
                        <button type="submit" class="btn btn-secondary">${icons.check} Enregistrer</button>
                    </form>
                </div>`;
            document.getElementById('newPhotoInput')?.addEventListener('change', e=>{
                newPhotoFiles=Array.from(e.target.files);
                document.getElementById('newPhotoPreview').innerHTML=newPhotoFiles.map((f,i)=>`<div class="photo-item"><img src="${URL.createObjectURL(f)}" alt="Preview"><button type="button" class="photo-remove" onclick="removeNewPhoto(${i})">${icons.x}</button></div>`).join('');
            });
            document.getElementById('editForm').addEventListener('submit', handleEditIncident);
            document.getElementById('completeForm').addEventListener('submit', handleCompleteIncident);
            document.getElementById('modal').classList.add('active');
        }

        function switchTab(tabName, e) {
            e.preventDefault();
            document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
            document.getElementById(tabName+'Tab').classList.add('active');
            e.target.classList.add('active');
        }

        async function handleEditIncident(e) {
            e.preventDefault();
            const artisanId = document.getElementById('editArtisanId').value;
            try {
                await api.patch(`/incidents/${editingIncidentId}`, {
                    category: document.getElementById('editCategory').value,
                    description: document.getElementById('editDescription').value,
                    artisan_id: artisanId ? parseInt(artisanId) : null
                });
                closeModal();
                await loadData();
                render();
            } catch(err) {
                alert('Erreur lors de la modification.');
            }
        }

        async function handleCompleteIncident(e) {
            e.preventDefault();
            const newStatus = document.getElementById('completeStatus').value;
            const notes = document.getElementById('completeNotes').value;
            const completeCostVal = document.getElementById('completeCost').value;
            try {
                await api.patch(`/incidents/${editingIncidentId}`, {
                    status: newStatus,
                    notes,
                    cost: completeCostVal ? parseFloat(completeCostVal) : null
                });
                if (newPhotoFiles.length > 0) {
                    await api.uploadPhotos(editingIncidentId, newPhotoFiles, 'after');
                }
                newPhotoFiles = [];
                closeModal();
                await loadData();
                render();
            } catch(err) {
                alert('Erreur lors de la mise à jour.');
            }
        }

        async function deleteIncident(incidentId) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cet incident ?')) return;
            try {
                await api.delete(`/incidents/${incidentId}`);
                closeModal();
                await loadData();
                render();
            } catch(err) {
                alert('Erreur lors de la suppression.');
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingIncidentId = null;
            newPhotoFiles = [];
        }

        function removeNewPhoto(idx) {
            newPhotoFiles.splice(idx,1);
            document.getElementById('newPhotoPreview').innerHTML=newPhotoFiles.map((f,i)=>`<div class="photo-item"><img src="${URL.createObjectURL(f)}" alt="Preview"><button type="button" class="photo-remove" onclick="removeNewPhoto(${i})">${icons.x}</button></div>`).join('');
        }

        function toggleAddArtisanForm() {
            const wrap = document.getElementById('addArtisanFormWrap');
            if (wrap) { const h=wrap.style.display==='none'; wrap.style.display=h?'block':'none'; if(h) document.getElementById('newArtisanName')?.focus(); }
        }

        async function saveNewArtisan() {
            const name = document.getElementById('newArtisanName')?.value.trim();
            const phone = document.getElementById('newArtisanPhone')?.value.trim();
            const specialty = document.getElementById('newArtisanSpecialty')?.value;
            if (!name||!phone||!specialty) { alert('Veuillez remplir tous les champs.'); return; }
            try {
                await api.post('/artisans', { name, specialty, phone });
                await loadData();
                render();
                setTimeout(()=>switchTopTab('artisans'),0);
            } catch(err) {
                alert('Erreur lors de l\'ajout.');
            }
        }

        async function deleteArtisan(artisanId) {
            if (!confirm('Supprimer cet artisan ?')) return;
            try {
                await api.delete(`/artisans/${artisanId}`);
                await loadData();
                render();
                setTimeout(()=>switchTopTab('artisans'),0);
            } catch(err) {
                alert('Erreur lors de la suppression.');
            }
        }

        // ===== WINDOW EXPORTS =====
        window.loginAs = async function(userId) {
            try {
                const result = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                if (!result.ok) throw new Error('Login échoué');
                const { token, user } = await result.json();
                localStorage.setItem('auth_token', token);
                currentUser = user;
                photoFiles=[]; newPhotoFiles=[]; editingIncidentId=null; currentTopTab='incidents';
                await loadData();
                render();
            } catch(err) {
                alert('Erreur de connexion.');
            }
        };

        window.logout = function() {
            localStorage.removeItem('auth_token');
            currentUser=null; appData={properties:[],artisans:[],incidents:[]};
            photoFiles=[]; newPhotoFiles=[]; editingIncidentId=null;
            render();
        };

        window.selectCategory = selectCategory;
        window.removePhoto = removePhoto;
        window.removeNewPhoto = removeNewPhoto;
        window.openIncidentModal = openIncidentModal;

        const APP_URL = 'https://achdar.onrender.com';

        window.showToast = function(msg, type) {
            const t = document.getElementById('toastNotif');
            t.textContent = msg;
            t.style.display = 'block';
            t.style.borderColor = type === 'warning' ? 'var(--warning)' : 'var(--success)';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => { t.style.display = 'none'; }, 4000);
        };

        window.showWhatsAppConfirm = function(incident) {
            const property = appData.properties.find(p => p.id === incident.property_id);
            const artisan = incident.artisan_id ? appData.artisans.find(a => a.id === incident.artisan_id) : null;
            const propName = property?.name || '';
            const agentNum = AGENT_ACCUEIL.whatsapp.replace(/[^0-9]/g, '');
            const agentNumDisplay = AGENT_ACCUEIL.whatsapp;
            const totalPhotos = (incident.photos || []).length;
            const photosBefore = (incident.photosBefore || []).length;
            const photosAfter = (incident.photosAfter || []).length;
            const photosLine = totalPhotos > 0
                ? '\n📸 ' + totalPhotos + ' photo(s) jointe(s) — consultez : ' + APP_URL
                : '\n📸 Aucune photo jointe';

            const msgAgent =
                'Salam 🔔 Nouvel incident — ACHDAR\n\n' +
                '📍 Propriété : ' + propName + '\n' +
                '🔧 Catégorie : ' + incident.category + '\n' +
                (artisan ? '👷 Artisan assigné : ' + artisan.name + ' (' + artisan.phone + ')\n' : '') +
                '\nDescription : ' + incident.description +
                photosLine +
                (incident.notes ? '\n\nNotes : ' + incident.notes : '');

            const msgArtisan = artisan ?
                'Salam 🔔 Incident assigné — ACHDAR\n\n' +
                'Bonjour ' + artisan.name + ',\n\n' +
                '📍 Propriété : ' + propName + '\n' +
                '🔧 Catégorie : ' + incident.category + '\n' +
                '\nDescription : ' + incident.description +
                photosLine +
                (incident.notes ? '\n\nNotes : ' + incident.notes : '') +
                '\n\n📞 Pour toute question, contactez notre agent d\'accueil : ' + agentNumDisplay
                : null;

            // Résumé affiché dans la modale
            const waModal = document.getElementById('waConfirmModal');
            document.getElementById('waConfirmBody').innerHTML =
                '<strong style="color:var(--text-primary);">' + propName + '</strong> · ' + incident.category + '<br>' +
                (artisan ? '👷 ' + artisan.name + '<br>' : '⚠️ Aucun artisan assigné<br>') +
                (totalPhotos > 0 ? '📸 ' + totalPhotos + ' photo(s)' : '📸 Pas de photos');

            const waIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

            let btnsHtml = `<a href="https://wa.me/${agentNum}?text=${encodeURIComponent(msgAgent)}" target="_blank"
                style="display:flex;align-items:center;justify-content:center;gap:7px;background:#25d366;color:#fff;padding:10px;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600;">
                ${waIcon} Agent d'accueil (${agentNumDisplay})
            </a>`;
            if (msgArtisan && artisan?.phone) {
                const artisanNum = artisan.phone.replace(/[^0-9]/g, '');
                btnsHtml += `<a href="https://wa.me/${artisanNum}?text=${encodeURIComponent(msgArtisan)}" target="_blank"
                    style="display:flex;align-items:center;justify-content:center;gap:7px;background:#128c7e;color:#fff;padding:10px;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600;">
                    ${waIcon} ${artisan.name} (${artisan.phone})
                </a>`;
            }
            document.getElementById('waConfirmBtns').innerHTML = btnsHtml;
            waModal.style.display = 'flex';
        };

        window.sendWhatsAppNotifications = function(incidentId) {
            const incident = appData.incidents.find(i => i.id === incidentId);
            if (!incident) return;
            const property = appData.properties.find(p => p.id === incident.property_id);
            const artisan = incident.artisan_id ? appData.artisans.find(a => a.id === incident.artisan_id) : null;
            const propName = property?.name || '';
            const agentNum = AGENT_ACCUEIL.whatsapp.replace(/[^0-9]/g, '');
            const agentNumDisplay = AGENT_ACCUEIL.whatsapp;
            const totalPhotos = (incident.photos || []).length;
            const photosBefore = (incident.photosBefore || []).length;
            const photosAfter = (incident.photosAfter || []).length;
            const photosLine = totalPhotos > 0
                ? '\n📸 Photos : ' + totalPhotos + ' photo(s) disponible(s) dans l\'app' +
                  (photosBefore > 0 ? ' (' + photosBefore + ' avant' : '') +
                  (photosAfter > 0 ? (photosBefore > 0 ? ', ' : ' (') + photosAfter + ' après)' : (photosBefore > 0 ? ')' : ''))
                : '';

            // Message → Agent d'accueil
            const msgAgent =
                '🔔 Incident signalé — ACHDAR\n\n' +
                '📍 Propriété : ' + propName + '\n' +
                '🔧 Catégorie : ' + incident.category + '\n' +
                (artisan ? '👷 Artisan assigné : ' + artisan.name + ' (' + artisan.phone + ')\n' : '⚠️ Aucun artisan assigné\n') +
                '\nDescription : ' + incident.description +
                photosLine +
                (incident.notes ? '\n\nNotes : ' + incident.notes : '');

            // Message → Artisan (avec contact agent pour qu'il réponde à lui)
            const msgArtisan = artisan ?
                'Salam 🔔 Incident assigné — ACHDAR\n\n' +
                'Bonjour ' + artisan.name + ',\n\n' +
                '📍 Propriété : ' + propName + '\n' +
                '🔧 Catégorie : ' + incident.category + '\n' +
                '\nDescription : ' + incident.description +
                photosLine +
                (incident.notes ? '\n\nNotes : ' + incident.notes : '') +
                '\n\n📞 Pour toute question merci de contacter directement notre agent d\'accueil :\n' + agentNumDisplay
                : null;

            // Ouvrir l'agent d'accueil en premier
            const urlAgent = 'https://wa.me/' + agentNum + '?text=' + encodeURIComponent(msgAgent);
            window.open(urlAgent, '_blank');

            // Ouvrir l'artisan après un court délai (évite le blocage popup)
            if (msgArtisan && artisan?.phone) {
                const artisanNum = artisan.phone.replace(/[^0-9]/g, '');
                const urlArtisan = 'https://wa.me/' + artisanNum + '?text=' + encodeURIComponent(msgArtisan);
                setTimeout(() => { window.open(urlArtisan, '_blank'); }, 800);
            }
        };
        window.openEditModal = openEditModal;
        window.openCompleteModal = openCompleteModal;
        window.switchTab = switchTab;
        window.switchTopTab = switchTopTab;
        window.deleteIncident = deleteIncident;
        window.closeModal = closeModal;
        window.updateCharCount = updateCharCount;
        window.pickStatus = function(val,btn) { document.getElementById('completeStatus').value=val; document.querySelectorAll('.status-pick-btn').forEach(b=>b.className='status-pick-btn'); btn.classList.add('active-'+val); };
        window.toggleAddArtisanForm = toggleAddArtisanForm;
        window.saveNewArtisan = saveNewArtisan;
        window.deleteArtisan = deleteArtisan;

        window.openEditArtisan = function(id) {
            // Fermer tous les autres formulaires ouverts
            document.querySelectorAll('[id^="artisan-edit-"]').forEach(el => el.style.display = 'none');
            const form = document.getElementById('artisan-edit-' + id);
            if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
        };

        window.saveEditArtisan = async function(id) {
            const name      = document.getElementById('edit-name-' + id)?.value.trim();
            const phone     = document.getElementById('edit-phone-' + id)?.value.trim();
            const specialty = document.getElementById('edit-specialty-' + id)?.value;
            if (!name || !phone || !specialty) { alert('Tous les champs sont obligatoires'); return; }
            try {
                await api.patch('/artisans/' + id, { name, phone, specialty });
                await loadData();
                render();
                window.showToast('✅ Artisan mis à jour');
            } catch(e) {
                alert('Erreur lors de la mise à jour.');
            }
        };

        // ===== LIGHTBOX =====
        let currentLightboxPhotos = [];
        let currentPhotoIndex = 0;
        let currentRotation = 0;
        window._photoSets = {}; // stocke les photos par incident id

        window.openLightbox = function(photoUrl, allPhotos) {
            currentLightboxPhotos = allPhotos || [photoUrl];
            currentPhotoIndex = currentLightboxPhotos.indexOf(photoUrl);
            if (currentPhotoIndex === -1) currentPhotoIndex = 0;
            currentRotation = 0;
            const img = document.getElementById('lightboxImage');
            img.src = currentLightboxPhotos[currentPhotoIndex];
            img.style.transform = 'rotate(0deg)';
            document.getElementById('photoLightbox').classList.add('active');
            updateLightboxNav();
            document.addEventListener('keydown', handleLightboxKeydown);
        };

        window.closeLightbox = function() {
            document.getElementById('photoLightbox').classList.remove('active');
            document.removeEventListener('keydown', handleLightboxKeydown);
        };

        window.prevPhoto = function() {
            if (currentPhotoIndex > 0) { currentPhotoIndex--; updateLightboxImage(); }
        };

        window.nextPhoto = function() {
            if (currentPhotoIndex < currentLightboxPhotos.length - 1) { currentPhotoIndex++; updateLightboxImage(); }
        };

        window.rotatePhoto = function(deg) {
            currentRotation = (currentRotation + deg + 360) % 360;
            document.getElementById('lightboxImage').style.transform = `rotate(${currentRotation}deg)`;
        };

        function updateLightboxImage() {
            currentRotation = 0;
            const img = document.getElementById('lightboxImage');
            img.src = currentLightboxPhotos[currentPhotoIndex];
            img.style.transform = 'rotate(0deg)';
            updateLightboxNav();
        }

        function updateLightboxNav() {
            const prev = document.getElementById('lightboxPrev');
            const next = document.getElementById('lightboxNext');
            document.getElementById('lightboxCounter').textContent = `${currentPhotoIndex + 1} / ${currentLightboxPhotos.length}`;
            prev.disabled = currentPhotoIndex === 0;
            next.disabled = currentPhotoIndex === currentLightboxPhotos.length - 1;
        }

        function handleLightboxKeydown(e) {
            if (e.key === 'Escape') window.closeLightbox();
            if (e.key === 'ArrowLeft') window.prevPhoto();
            if (e.key === 'ArrowRight') window.nextPhoto();
            if (e.key === 'r' || e.key === 'R') window.rotatePhoto(90);
        }

        // ===== INIT =====
        // Auto-restore session if token exists
        (async function init() {
            const token = localStorage.getItem('auth_token');
            if (token) {
                try {
                    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
                    const payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
                    if (payload.exp * 1000 > Date.now()) {
                        currentUser = { id: payload.id, name: payload.name, role: payload.role, property_ids: payload.property_ids };
                        await loadData();
                        document.getElementById('loadingOverlay').style.display = 'none';
                        render();
                        return;
                    }
                } catch {}
                localStorage.removeItem('auth_token');
            }
            document.getElementById('loadingOverlay').style.display = 'none';
            render();
        })();
    </script>
</body>
</html>
